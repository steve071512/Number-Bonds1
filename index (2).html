<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <title>수 가르기 게임</title>
  <style>
    :root {
      --bg:      #EFF6FF;
      --primary: #3B82F6;
      --deep:    #1D4ED8;
      --accent:  #F59E0B;
      --soft:    #DBEAFE;
      --correct: #10B981;
      --wrong:   #EF4444;
      --text:    #1E3A5F;
      --font:    'Noto Sans KR', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: var(--font);
      background: var(--bg);
    }

    /* 배경 장식 */
    .blobs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .blob  { position: absolute; border-radius: 50%; filter: blur(70px); opacity: 0.28; }
    .b1 { width: 40vw; height: 40vw; background: #93C5FD; top: -10%; right: -8%; }
    .b2 { width: 30vw; height: 30vw; background: #FDE68A; bottom: -8%; left: -6%; }
    .b3 { width: 22vw; height: 22vw; background: #A7F3D0; top: 40%; left: -5%; }

    /* 공통 화면 */
    .screen {
      position: relative; z-index: 1;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .screen.hidden { display: none; }

    /* ════════ 입력 화면 ════════ */
    .input-card {
      background: #fff;
      border-radius: clamp(16px, 2.4vw, 36px);
      padding: clamp(28px, 4vh, 60px) clamp(32px, 5vw, 90px);
      box-shadow: 0 16px 60px rgba(59,130,246,0.16);
      display: flex; flex-direction: column;
      align-items: center;
      gap: clamp(16px, 2.5vh, 36px);
      width: min(820px, 88vw);
      border: 3px solid rgba(59,130,246,0.1);
    }
    .input-title {
      font-size: clamp(26px, 3.8vw, 50px);
      font-weight: 900; color: var(--text);
      text-align: center; line-height: 1.25;
    }
    .input-title span { color: var(--primary); }
    .input-sub {
      font-size: clamp(14px, 1.9vw, 28px);
      font-weight: 700; color: #64748B; text-align: center;
      margin-top: clamp(-10px,-1.2vh,-4px);
    }
    .num-pad {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: clamp(8px, 1.1vw, 14px);
      width: 100%;
    }
    .np-btn {
      height: clamp(52px, 7.5vh, 96px);
      background: var(--soft);
      border: 3px solid transparent;
      border-radius: clamp(10px, 1.2vw, 18px);
      font-size: clamp(22px, 3vw, 46px);
      font-weight: 900; font-family: var(--font);
      color: var(--primary); cursor: pointer;
      transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1);
    }
    .np-btn:hover {
      background: var(--primary); color: #fff;
      transform: translateY(-4px) scale(1.07);
      box-shadow: 0 8px 22px rgba(59,130,246,0.32);
    }
    .np-btn.sel {
      background: var(--primary); border-color: var(--deep);
      color: #fff; transform: scale(1.09);
      box-shadow: 0 6px 20px rgba(59,130,246,0.38);
    }
    .start-btn {
      padding: clamp(10px,1.6vh,20px) clamp(32px,6vw,80px);
      background: linear-gradient(135deg, var(--accent), #D97706);
      border: none; border-radius: 99px;
      font-size: clamp(18px, 2.6vw, 42px);
      font-weight: 900; font-family: var(--font);
      color: #fff; cursor: pointer;
      box-shadow: 0 8px 26px rgba(245,158,11,0.36);
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
      opacity: 0.38; pointer-events: none;
    }
    .start-btn.on { opacity: 1; pointer-events: auto; }
    .start-btn.on:hover { transform: translateY(-5px) scale(1.05); }

    /* ════════ 게임 화면 ════════ */
    #gameScreen { justify-content: flex-start; }

    header {
      width: 100%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--deep), var(--primary));
      padding: clamp(8px, 1.4vh, 18px) clamp(18px, 2.8vw, 52px);
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 3px 16px rgba(29,78,216,0.3);
    }
    .h-title {
      font-size: clamp(18px, 2.4vw, 38px);
      font-weight: 900; color: #fff; white-space: nowrap;
    }
    .h-stats { display: flex; gap: clamp(8px, 1.4vw, 28px); align-items: center; }
    .h-pill {
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.28);
      border-radius: 99px;
      padding: clamp(4px,0.7vh,10px) clamp(12px,1.6vw,24px);
      display: flex; align-items: center;
      gap: clamp(5px,0.8vw,12px);
    }
    .h-lbl { font-size: clamp(10px,1.2vw,18px); font-weight: 700; color: rgba(255,255,255,0.85); white-space: nowrap; }
    .h-val { font-size: clamp(16px,2.1vw,34px); font-weight: 900; color: #fff; min-width: 26px; text-align: center; }
    .h-val.g { color: #6EE7B7; }
    .h-val.r { color: #FCA5A5; }

    .prog-bar { width: 100%; height: 9px; flex-shrink: 0; background: rgba(59,130,246,0.12); }
    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--correct), #059669);
      transition: width 0.5s ease;
      border-radius: 0 4px 4px 0;
    }

    /* 게임 본문 — 남은 공간을 비율로 채움 */
    .game-body {
      flex: 1; min-height: 0; width: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: space-evenly;
      padding: clamp(6px,1vh,16px) clamp(16px,2.5vw,56px);
      overflow: hidden;
    }

    /* 배너 */
    .q-banner {
      font-size: clamp(14px, 1.8vw, 28px);
      font-weight: 700; color: var(--text);
      background: #fff;
      padding: clamp(7px,0.9vh,13px) clamp(18px,2.5vw,42px);
      border-radius: 99px;
      box-shadow: 0 3px 12px rgba(59,130,246,0.1);
      border: 2px solid var(--soft);
      white-space: nowrap;
    }
    .q-banner .nb { color: var(--primary); font-weight: 900; font-size: 1.2em; }

    /* 가르기 시각 */
    .split-row {
      display: flex; align-items: center;
      justify-content: center;
      gap: clamp(12px, 2vw, 44px);
      width: 100%;
    }
    .bk-col {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: clamp(4px,0.6vh,9px);
    }
    .bk-lbl { font-size: clamp(12px,1.5vw,24px); font-weight: 700; color: #64748B; }
    .basket {
      width: 100%;
      height: clamp(120px, 20vh, 230px);
      background: #fff;
      border-radius: clamp(12px,1.4vw,22px);
      border: 4px solid var(--soft);
      box-shadow: 0 4px 16px rgba(59,130,246,0.09);
      display: flex; flex-wrap: wrap;
      align-items: center; justify-content: center;
      gap: clamp(4px, 0.7vw, 11px);
      padding: clamp(6px,0.9vw,16px);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .bk-left  { border-color: #93C5FD; }
    .bk-right { border-color: var(--accent); border-style: dashed; border-width: 4px; }
    .bk-ok    { border-color: var(--correct); box-shadow: 0 0 0 5px rgba(16,185,129,0.2); }
    .bk-ng    { border-color: var(--wrong);   box-shadow: 0 0 0 5px rgba(239,68,68,0.16); }

    .bk-count { font-size: clamp(14px,1.8vw,30px); font-weight: 900; color: var(--primary); }
    .bk-count.q { color: var(--accent); }

    .dot {
      display: inline-flex; align-items: center; justify-content: center;
      animation: dotPop 0.26s cubic-bezier(0.34,1.56,0.64,1) backwards;
      line-height: 1;
      user-select: none;
    }
    @keyframes dotPop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }

    .q-mark-big {
      font-size: clamp(36px,5.5vh,80px);
      font-weight: 900; color: var(--accent);
      animation: pulse 1.1s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.13)} }

    .mid-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
    .total-big {
      font-size: clamp(40px,6.5vw,82px);
      font-weight: 900; color: var(--primary); line-height: 1;
      text-shadow: 2px 3px 0 rgba(59,130,246,0.16);
    }
    .arrows { font-size: clamp(18px,2.5vw,36px); color: #94A3B8; }

    /* 보기 */
    .choices { display: flex; gap: clamp(9px,1.4vw,24px); justify-content: center; flex-shrink: 0; }
    .c-btn {
      width: clamp(72px,10vw,158px);
      height: clamp(52px,8.5vh,96px);
      background: #fff;
      border: 3px solid #E2E8F0;
      border-radius: clamp(10px,1.3vw,18px);
      font-size: clamp(24px,3.5vw,52px);
      font-weight: 900; font-family: var(--font);
      color: var(--text); cursor: pointer;
      transition: all 0.16s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 3px 10px rgba(0,0,0,0.07);
    }
    .c-btn:hover:not(:disabled) {
      border-color: var(--primary); color: var(--primary);
      transform: translateY(-6px) scale(1.09);
      box-shadow: 0 12px 28px rgba(59,130,246,0.24);
    }
    .c-btn.ok {
      background: linear-gradient(135deg,#10B981,#059669);
      border-color: #059669; color: #fff;
      transform: scale(1.11);
      box-shadow: 0 12px 34px rgba(16,185,129,0.4);
    }
    .c-btn.ng {
      background: linear-gradient(135deg,#EF4444,#DC2626);
      border-color: #DC2626; color: #fff;
      animation: shake .4s ease;
    }
    .c-btn:disabled { cursor: not-allowed; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-9px)} 75%{transform:translateX(9px)} }

    /* 피드백 + 다음 */
    .foot-row {
      display: flex; align-items: center; justify-content: center;
      gap: clamp(10px,1.8vw,32px); flex-shrink: 0;
      min-height: clamp(40px,6.5vh,74px);
    }
    .fb-msg {
      font-size: clamp(16px,2.2vw,38px);
      font-weight: 900; white-space: nowrap;
      opacity: 0; transition: opacity 0.2s;
    }
    .fb-msg.show { opacity: 1; animation: bIn .32s ease; }
    .fb-msg.c { color: var(--correct); }
    .fb-msg.w { color: var(--wrong); }

    .next-btn {
      padding: clamp(7px,1.1vh,16px) clamp(22px,3.6vw,52px);
      background: linear-gradient(135deg,var(--primary),var(--deep));
      border: none; border-radius: 99px;
      font-size: clamp(14px,1.8vw,32px);
      font-weight: 900; font-family: var(--font);
      color: #fff; cursor: pointer;
      box-shadow: 0 5px 18px rgba(59,130,246,0.36);
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
      opacity: 0; pointer-events: none;
    }
    .next-btn.show { opacity: 1; pointer-events: auto; animation: bIn .32s ease; }
    .next-btn:hover { transform: translateY(-4px) scale(1.05); }

    @keyframes bIn { from{transform:scale(0.5);opacity:0} 65%{transform:scale(1.1)} to{transform:scale(1);opacity:1} }

    /* ════════ 결과 화면 ════════ */
    .result-card {
      background: #fff;
      border-radius: clamp(16px,2.4vw,40px);
      padding: clamp(28px,4.5vh,64px) clamp(36px,7vw,100px);
      box-shadow: 0 18px 60px rgba(59,130,246,0.17);
      display: flex; flex-direction: column;
      align-items: center; gap: clamp(12px,2.2vh,32px);
      width: min(820px, 88vw);
      animation: bIn .55s ease;
    }
    .r-emoji { font-size: clamp(56px,9vw,104px); animation: spinIn .62s ease; }
    @keyframes spinIn {
      from{transform:rotate(-20deg) scale(0);opacity:0}
      65%{transform:rotate(8deg) scale(1.18)}
      to{transform:rotate(0) scale(1);opacity:1}
    }
    .r-title {
      font-size: clamp(20px,3vw,54px);
      font-weight: 900; color: var(--text);
      text-align: center; line-height: 1.3;
    }
    .r-score { display: flex; align-items: baseline; gap: 7px; }
    .r-big  { font-size: clamp(44px,6.5vw,84px); font-weight: 900; color: var(--correct); line-height: 1; }
    .r-of   { font-size: clamp(16px,2.2vw,34px); font-weight: 700; color: #94A3B8; }
    .r-den  { font-size: clamp(28px,4vw,60px); font-weight: 900; color: var(--text); }
    .r-stars { font-size: clamp(26px,3.6vw,52px); letter-spacing: 4px; }
    .r-btns { display: flex; gap: clamp(10px,1.4vw,20px); flex-wrap: wrap; justify-content: center; }
    .btn-again, .btn-new {
      padding: clamp(10px,1.4vh,20px) clamp(24px,4.5vw,60px);
      border: none; border-radius: 99px;
      font-size: clamp(14px,2vw,36px); font-weight: 900;
      font-family: var(--font); color: #fff; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-again { background: linear-gradient(135deg,var(--primary),var(--deep)); box-shadow: 0 6px 20px rgba(59,130,246,0.36); }
    .btn-new   { background: linear-gradient(135deg,var(--accent),#D97706);      box-shadow: 0 6px 20px rgba(245,158,11,0.36); }
    .btn-again:hover, .btn-new:hover { transform: translateY(-4px) scale(1.05); }

    /* 컨페티 */
    .cf-layer { position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden; }
    .cf { position: absolute; top: -20px; border-radius: 3px; animation: cfFall linear forwards; }
    @keyframes cfFall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
  </style>
</head>
<body>
  <div class="blobs">
    <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
  </div>
  <div class="cf-layer" id="cfLayer"></div>

  <!-- 화면 1: 입력 -->
  <div class="screen" id="inputScreen">
    <div class="input-card">
      <div>
        <div class="input-title">🔢 수 <span>가르기</span> 게임</div>
        <div class="input-sub">가를 숫자를 골라 주세요!</div>
      </div>
      <div class="num-pad" id="numPad"></div>
      <button class="start-btn" id="startBtn" onclick="startGame()">🚀 게임 시작!</button>
    </div>
  </div>

  <!-- 화면 2: 게임 -->
  <div class="screen hidden" id="gameScreen">
    <header>
      <div class="h-title" id="hTitle">🔢 수 가르기 게임</div>
      <div class="h-stats">
        <div class="h-pill"><span class="h-lbl">✅ 맞았어요</span><span class="h-val g" id="sC">0</span></div>
        <div class="h-pill"><span class="h-lbl">📋 문제</span><span class="h-val" id="sQ">1 / 10</span></div>
        <div class="h-pill"><span class="h-lbl">❌ 틀렸어요</span><span class="h-val r" id="sW">0</span></div>
      </div>
    </header>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>

    <div class="game-body">
      <div class="q-banner">
        <span class="nb" id="bannerN">7</span>을 가르면?
        오른쪽 바구니에는 몇 개일까요? 🤔
      </div>

      <div class="split-row">
        <div class="bk-col">
          <div class="bk-lbl">왼쪽 바구니 🧺</div>
          <div class="basket bk-left" id="bkLeft"></div>
          <div class="bk-count" id="cntL">3개</div>
        </div>
        <div class="mid-col">
          <div class="total-big" id="totalBig">7</div>
          <div class="arrows">⟵ ⟶</div>
        </div>
        <div class="bk-col">
          <div class="bk-lbl">오른쪽 바구니 🧺</div>
          <div class="basket bk-right" id="bkRight"><div class="q-mark-big">?</div></div>
          <div class="bk-count q" id="cntR">?개</div>
        </div>
      </div>

      <div class="choices" id="choices"></div>

      <div class="foot-row">
        <div class="fb-msg" id="fbMsg"></div>
        <button class="next-btn" id="nextBtn" onclick="nextQ()">다음 문제 ▶</button>
      </div>
    </div>
  </div>

  <!-- 화면 3: 결과 -->
  <div class="screen hidden" id="resultScreen">
    <div class="result-card">
      <div class="r-emoji" id="rEmoji">🏆</div>
      <div class="r-title" id="rTitle">잘 했어요!</div>
      <div class="r-score">
        <span class="r-big" id="rScore">0</span>
        <span class="r-of">/</span>
        <span class="r-den">10</span>
        <span class="r-of" style="font-size:.72em">맞았어요!</span>
      </div>
      <div class="r-stars" id="rStars">⭐⭐⭐</div>
      <div class="r-btns">
        <button class="btn-again" onclick="playAgain()">🔄 같은 숫자로 다시</button>
        <button class="btn-new"   onclick="goInput()">🔢 다른 숫자로 하기</button>
      </div>
    </div>
  </div>

  <script>
    let target=0,curQ=0,ok=0,ng=0,answered=false,rightAns=0,selNum=0;
    const TOTAL=10;

    let AC;
    function ac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
    function tone(f,d,t='sine',v=0.24){
      const c=ac(),o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;
      g.gain.setValueAtTime(v,c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);
      o.start();o.stop(c.currentTime+d);
    }
    function sndOk(){tone(523,.09);setTimeout(()=>tone(659,.09),95);setTimeout(()=>tone(784,.18),190);}
    function sndNg(){tone(300,.12,'sawtooth',.18);setTimeout(()=>tone(240,.2,'sawtooth',.14),130);}
    function sndEnd(){[523,659,784,880,1047].forEach((f,i)=>setTimeout(()=>tone(f,.16),i*115));}

    /* 숫자 패드 */
    (function(){
      const pad=document.getElementById('numPad');
      for(let n=2;n<=10;n++){
        const b=document.createElement('button');
        b.className='np-btn';b.textContent=n;
        b.onclick=()=>pickNum(n,b);pad.appendChild(b);
      }
    })();

    function pickNum(n,btn){
      document.querySelectorAll('.np-btn').forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');selNum=n;
      document.getElementById('startBtn').classList.add('on');
    }

    function startGame(){
      if(!selNum)return;
      ac();target=selNum;curQ=0;ok=0;ng=0;answered=false;
      show('gameScreen');
      document.getElementById('hTitle').textContent=`🔢  ${target} 가르기 게임`;
      refresh();buildQ();
    }

    function buildQ(){
      answered=false;
      document.getElementById('fbMsg').className='fb-msg';
      document.getElementById('fbMsg').textContent='';
      document.getElementById('nextBtn').className='next-btn';

      const left=1+(curQ%(target-1));
      rightAns=target-left;

      document.getElementById('bannerN').textContent=target;
      document.getElementById('totalBig').textContent=target;
      document.getElementById('cntL').textContent=`${left}개`;
      document.getElementById('cntR').textContent='?개';

      /* 왼쪽 바구니 */
      const bkL=document.getElementById('bkLeft');
      bkL.innerHTML='';bkL.className='basket bk-left';
      const appleSz=Math.max(32,Math.min(72,Math.floor(200/Math.max(target,4))));
      for(let i=0;i<left;i++){
        const d=document.createElement('span');
        d.className='dot';
        d.textContent='🍎';
        d.style.cssText=`font-size:${appleSz}px;animation-delay:${i*.04}s`;
        bkL.appendChild(d);
      }

      /* 오른쪽 바구니 */
      const bkR=document.getElementById('bkRight');
      bkR.innerHTML='<div class="q-mark-big">?</div>';
      bkR.className='basket bk-right';

      /* 보기 */
      const set=new Set([rightAns]);
      let tries=0;
      while(set.size<4&&tries<60){
        const c=rightAns+(Math.random()>.5?1:-1)*Math.ceil(Math.random()*3);
        if(c>=0&&c<=target&&c!==rightAns)set.add(c);
        tries++;
      }
      for(let x=0;x<=target&&set.size<4;x++)if(!set.has(x))set.add(x);
      const arr=shuffle([...set].slice(0,4));
      const area=document.getElementById('choices');
      area.innerHTML='';
      arr.forEach(n=>{
        const b=document.createElement('button');
        b.className='c-btn';b.textContent=n;
        b.onclick=()=>pick(b,n);area.appendChild(b);
      });
      refresh();
    }

    function pick(btn,val){
      if(answered)return;
      answered=true;
      const isOk=val===rightAns;
      document.querySelectorAll('.c-btn').forEach(b=>{
        b.disabled=true;
        if(+b.textContent===rightAns)b.classList.add('ok');
      });
      const bkR=document.getElementById('bkRight');
      const fb=document.getElementById('fbMsg');

      if(isOk){
        btn.classList.add('ok');ok++;
        fb.textContent='🎉 정답이에요!';fb.className='fb-msg show c';
        bkR.className='basket bk-right bk-ok';
        bkR.innerHTML='';
        if(rightAns===0){
          bkR.innerHTML='<span style="font-size:2.4em">0️⃣</span>';
        } else {
          const appleSz=Math.max(32,Math.min(72,Math.floor(200/Math.max(target,4))));
          for(let i=0;i<rightAns;i++){
            const d=document.createElement('span');
            d.className='dot';
            d.textContent='🍎';
            d.style.cssText=`font-size:${appleSz}px;animation-delay:${i*.05}s`;
            bkR.appendChild(d);
          }
        }
        document.getElementById('cntR').textContent=`${rightAns}개`;
        sndOk();confetti(26);
      } else {
        btn.classList.add('ng');ng++;
        fb.textContent=`😅 정답은 ${rightAns}개예요!`;fb.className='fb-msg show w';
        bkR.className='basket bk-right bk-ng';sndNg();
      }
      curQ++;
      if(curQ>=TOTAL)setTimeout(showResult,880);
      else document.getElementById('nextBtn').className='next-btn show';
      refresh();
    }

    function nextQ(){buildQ();}

    function refresh(){
      document.getElementById('sC').textContent=ok;
      document.getElementById('sW').textContent=ng;
      document.getElementById('sQ').textContent=`${Math.min(curQ+1,TOTAL)} / ${TOTAL}`;
      document.getElementById('progFill').style.width=(curQ/TOTAL*100)+'%';
    }

    function showResult(){
      show('resultScreen');
      document.getElementById('rScore').textContent=ok;
      const p=ok/TOTAL;
      let e,t,s;
      if(p===1)     {e='🏆';t='완벽해요! 10개 모두 맞았어요! 🥇';s='⭐⭐⭐⭐⭐';}
      else if(p>=.8){e='🌟';t='아주 잘했어요! 대단해요! 👏';s='⭐⭐⭐⭐';}
      else if(p>=.6){e='😊';t='잘 했어요! 조금만 더 연습해요!';s='⭐⭐⭐';}
      else if(p>=.4){e='💪';t='괜찮아요! 다시 해봐요!';s='⭐⭐';}
      else          {e='🌱';t='같이 다시 연습해 봐요! 화이팅!';s='⭐';}
      document.getElementById('rEmoji').textContent=e;
      document.getElementById('rTitle').textContent=t;
      document.getElementById('rStars').textContent=s;
      sndEnd();confetti(72);
    }

    function playAgain(){
      curQ=0;ok=0;ng=0;answered=false;
      show('gameScreen');refresh();buildQ();
    }
    function goInput(){
      show('inputScreen');
      document.querySelectorAll('.np-btn').forEach(b=>b.classList.remove('sel'));
      document.getElementById('startBtn').classList.remove('on');
      selNum=0;
    }
    function show(id){
      ['inputScreen','gameScreen','resultScreen'].forEach(s=>
        document.getElementById(s).classList.toggle('hidden',s!==id)
      );
    }
    function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

    const CF=['#3B82F6','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899','#34D399','#FCD34D'];
    function confetti(n=34){
      const l=document.getElementById('cfLayer');
      for(let i=0;i<n;i++){
        const el=document.createElement('div');
        el.className='cf';
        const sz=7+Math.random()*13,dur=1.3+Math.random()*1.5,del=Math.random()*.7;
        el.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${CF[Math.floor(Math.random()*CF.length)]};border-radius:${Math.random()>.5?'50%':'3px'};animation-duration:${dur}s;animation-delay:${del}s`;
        l.appendChild(el);
        setTimeout(()=>el.remove(),(dur+del)*1000+200);
      }
    }
  </script>
</body>
</html>
